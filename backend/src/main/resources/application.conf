ktor {
  deployment {
    host = ${?HOST}
    host = "0.0.0.0"

    port = ${?PORT}
    port = 8080
  }

  application {
    modules = [ ru.ekrupin.ivi.backend.ApplicationKt.module ]
  }
}

ivi {
  contract {
    openApiPath = "../api/generated/openapi/openapi.yaml"
  }

  database {
    jdbcUrl = ${?DB_JDBC_URL}
    jdbcUrl = "jdbc:postgresql://localhost:5432/ivi"

    username = ${?DB_USERNAME}
    username = "ivi"

    password = ${?DB_PASSWORD}
    password = "ivi"
  }
}
