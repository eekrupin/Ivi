ktor {
  deployment {
    host = ${?HOST}
    host = "0.0.0.0"

    port = ${?PORT}
    port = 8080
  }

  application {
    modules = [ ru.ekrupin.ivi.backend.ApplicationKt.module ]
  }
}

ivi {
  contract {
    openApiPath = "../api/generated/openapi/openapi.yaml"
  }

  database {
    jdbcUrl = ${?DB_JDBC_URL}
    jdbcUrl = "jdbc:postgresql://localhost:55432/ivi"

    username = ${?DB_USERNAME}
    username = "ivi"

    password = ${?DB_PASSWORD}
    password = "ivi"

    driverClassName = "org.postgresql.Driver"
    maximumPoolSize = 5
  }

  auth {
    jwtSecret = ${?AUTH_JWT_SECRET}
    jwtSecret = "change-me-local-dev-secret"

    jwtIssuer = ${?AUTH_JWT_ISSUER}
    jwtIssuer = "ivi-backend"

    jwtAudience = ${?AUTH_JWT_AUDIENCE}
    jwtAudience = "ivi-clients"

    accessTtlSeconds = ${?AUTH_ACCESS_TTL_SECONDS}
    accessTtlSeconds = 3600

    refreshTtlSeconds = ${?AUTH_REFRESH_TTL_SECONDS}
    refreshTtlSeconds = 2592000
  }
}
